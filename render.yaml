# ============================================================
# render.yaml
# ============================================================
# WHY: Tells Render how to build and run this service.
# Deploy at https://render.com free tier, no credit card required.

services:
  - type: web
    name: ml-penguin-predictor
    runtime: python
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn mlstudio.serve_case:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.14"
